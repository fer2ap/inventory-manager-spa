services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inventory-manager-spa:latest
    container_name: inventory-manager-spa
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=80
    healthcheck:
      test: ["CMD", "node", "-e", "require('node:http').get('http://127.0.0.1:80/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
